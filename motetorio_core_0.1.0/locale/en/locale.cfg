[space-location-description]
mote-life-plane=A lush and verdant dimension of bountiful flora, where life flourishes bathed in water and supported by earth, which rejects the decaying touch of shadow.
mote-earth-plane=A sturdy, rigid dimension of solid stone, where life finds a endures and fire burns just below the surface, despite the thin air.
mote-fire-plane=A fiery, incandescent dimension with blazing pools of primordial fire, cradled in earth and shrouded in smokey shadow. Not a drop of water is to be found on this scorching plane.
mote-shadow-plane=A gloomy, decaying dimension kept warm by smoldering fires feed by gusty winds. The only life here is that little bit that can survive on the endless decay.
mote-air-plane=A tempestuous world held aloft in an endless sky. The shadows of overhead storms pass by as rain falls ever downward. Earthen mountains only wish they could reach this high.
mote-water-plane=An aqueous dimension half drowned in an endless sea. Wicked storms blow overhead, but plentiful fish live in the depths. Any flame that dares show its spark is quickly extinguished.
mote-elemental-nexus=Little more than a pinhole between realities, the Elemental Nexus connects the Engineer's universe to the realm of primordial elements and alchemical industry.
mote-entropic-vortex=A swirling vortex of chaos and entropy at the heart of the elemental planes. Judging by the ruins swirling around it, there used to be a vast library here...

